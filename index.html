<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Camera Access</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }
        p {
            color: #6c757d;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        #cameraBtn {
            background: #4a6cf7;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3);
        }
        #cameraBtn:hover { background: #3a5cd9; transform: translateY(-2px); }
        #cameraBtn:active { transform: scale(0.96); }
        #cameraBtn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        #status {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
        }
        #status.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #status.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        #videoContainer {
            margin-top: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: none;
            position: relative;
        }
        #videoContainer video {
            width: 100%;
            display: block;
            max-height: 400px;
            object-fit: cover;
        }
        .btn-icon {
            font-size: 1.3rem;
        }
        .permission-badge {
            display: inline-block;
            background: #e9ecef;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #495057;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Camera Access</h1>
        <p>Tap the button below to open your camera</p>

        <button id="cameraBtn">
            <span class="btn-icon">📷</span> Open Camera
        </button>

        <div id="status"></div>

        <div id="videoContainer">
            <video id="video" autoplay playsinline></video>
        </div>

        <div class="permission-badge" id="permBadge">Permission: Unknown</div>
    </div>

    <script>
        (function() {
            const cameraBtn = document.getElementById('cameraBtn');
            const statusDiv = document.getElementById('status');
            const videoContainer = document.getElementById('videoContainer');
            const video = document.getElementById('video');
            const permBadge = document.getElementById('permBadge');

            let stream = null;
            let isCameraActive = false;

            // Helper: Update status message
            function setStatus(message, type = 'info') {
                statusDiv.textContent = message;
                statusDiv.className = type;
                statusDiv.style.display = 'block';
            }

            // Helper: Clear status
            function clearStatus() {
                statusDiv.style.display = 'none';
                statusDiv.className = '';
                statusDiv.textContent = '';
            }

            // Update permission badge
            function updatePermissionBadge(state) {
                const labels = {
                    'granted': '✅ Granted',
                    'denied': '❌ Denied',
                    'prompt': '⏳ Prompt',
                    'unknown': '❓ Unknown'
                };
                permBadge.textContent = `Permission: ${labels[state] || state}`;
            }

            // Check current permission state using Permissions API (if available)
            async function checkPermissionState() {
                try {
                    if (navigator.permissions && navigator.permissions.query) {
                        const result = await navigator.permissions.query({ name: 'camera' });
                        updatePermissionBadge(result.state);
                        return result.state;
                    }
                } catch (e) {
                    // Permissions API not supported or fails
                }
                return 'unknown';
            }

            // Stop camera stream
            function stopCamera() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                video.srcObject = null;
                videoContainer.style.display = 'none';
                isCameraActive = false;
                cameraBtn.innerHTML = '<span class="btn-icon">📷</span> Open Camera';
                cameraBtn.disabled = false;
                clearStatus();
            }

            // Start camera
            async function startCamera() {
                // Check if already active
                if (isCameraActive) {
                    setStatus('Camera is already running', 'info');
                    return;
                }

                cameraBtn.disabled = true;
                cameraBtn.innerHTML = '⏳ Requesting...';

                try {
                    // Request camera with user permission
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    });

                    // Success: display video
                    video.srcObject = stream;
                    videoContainer.style.display = 'block';
                    isCameraActive = true;
                    cameraBtn.innerHTML = '⏹️ Stop Camera';
                    cameraBtn.disabled = false;
                    setStatus('✅ Camera is active', 'success');

                    // Update permission state
                    const state = await checkPermissionState();
                    updatePermissionBadge(state);

                    // Handle stream ending (user revokes permission or other error)
                    stream.getVideoTracks()[0].addEventListener('ended', () => {
                        stopCamera();
                        setStatus('Camera was stopped', 'info');
                    });

                } catch (err) {
                    console.error('Camera error:', err);
                    let errorMsg = 'Unable to access camera.';

                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        errorMsg = '❌ Permission denied. Please allow camera access in your browser settings.';
                        updatePermissionBadge('denied');
                    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                        errorMsg = '❌ No camera found on this device.';
                    } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                        errorMsg = '❌ Camera is in use by another application.';
                    } else if (err.name === 'OverconstrainedError') {
                        errorMsg = '❌ Camera does not support requested settings.';
                    } else {
                        errorMsg = `❌ Error: ${err.message || 'Unknown error'}`;
                    }

                    setStatus(errorMsg, 'error');
                    cameraBtn.innerHTML = '<span class="btn-icon">📷</span> Open Camera';
                    cameraBtn.disabled = false;
                    stopCamera();
                }
            }

            // Toggle camera on/off
            async function toggleCamera() {
                if (isCameraActive) {
                    stopCamera();
                    setStatus('Camera stopped', 'info');
                } else {
                    await startCamera();
                }
            }

            // Permission change listener (when user changes permission via browser)
            async function handlePermissionChange() {
                const state = await checkPermissionState();
                updatePermissionBadge(state);

                // If permission was revoked while camera is active, stop it
                if (state === 'denied' && isCameraActive) {
                    stopCamera();
                    setStatus('Camera access was revoked', 'error');
                }
            }

            // Initialize
            (async function init() {
                // Check initial permission
                const state = await checkPermissionState();
                updatePermissionBadge(state);

                // Listen for permission changes (if supported)
                try {
                    if (navigator.permissions && navigator.permissions.query) {
                        const perm = await navigator.permissions.query({ name: 'camera' });
                        perm.addEventListener('change', handlePermissionChange);
                    }
                } catch (e) {
                    // Ignore
                }

                // Button click handler
                cameraBtn.addEventListener('click', toggleCamera);

                // Cleanup on page unload
                window.addEventListener('beforeunload', () => {
                    stopCamera();
                });

                console.log('📷 Camera app initialized. Tap the button to request permission.');
            })();

        })();
    </script>
</body>
</html>
